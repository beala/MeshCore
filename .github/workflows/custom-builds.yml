name: Custom Builds

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */8 * * *'  # Check every 8 hours
  workflow_dispatch:
    inputs:
      upstream_version:
        description: 'Upstream version to sync to (e.g., v1.2.3). Leave empty to auto-detect latest.'
        required: false
      force:
        description: 'Force build even if a release already exists for this upstream version.'
        type: boolean
        default: false

jobs:

  check:
    runs-on: ubuntu-latest
    outputs:
      upstream_version: ${{ steps.check.outputs.upstream_version }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:

      - name: Check for new upstream release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.upstream_version }}" ]; then
            UPSTREAM_VERSION="${{ github.event.inputs.upstream_version }}"
            echo "Using manually specified version: $UPSTREAM_VERSION"
            echo "upstream_version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            # Get the latest version from repeater releases (strip the "repeater-" prefix)
            LATEST_TAG=$(gh release list --repo meshcore-dev/MeshCore --json tagName -q '[.[] | select(.tagName | startswith("repeater-"))] | first | .tagName')
            UPSTREAM_VERSION="${LATEST_TAG#repeater-}"
            echo "Latest upstream version: $UPSTREAM_VERSION"
            # Check if we already have releases for this version (all builds must exist to skip)
            if [ "${{ github.event.inputs.force }}" != "true" ] \
              && gh release view "t1000e-${UPSTREAM_VERSION}" --repo ${{ github.repository }} &>/dev/null 2>&1 \
              && gh release view "rak3401-${UPSTREAM_VERSION}" --repo ${{ github.repository }} &>/dev/null 2>&1; then
              echo "Already processed upstream version $UPSTREAM_VERSION — skipping."
              echo "should_build=false" >> $GITHUB_OUTPUT
            else
              echo "New upstream version found: $UPSTREAM_VERSION"
              echo "upstream_version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
              echo "should_build=true" >> $GITHUB_OUTPUT
            fi
          fi

  build-t1000e:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      UPSTREAM_VERSION: ${{ needs.check.outputs.upstream_version }}
      UPSTREAM_TAG: companion-${{ needs.check.outputs.upstream_version }}
    steps:

      - name: Clone Repo
        uses: actions/checkout@v4
        with:
          ref: beala/t1000e
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase onto upstream release
        run: |
          git remote add upstream https://github.com/meshcore-dev/MeshCore.git
          git fetch upstream tag "$UPSTREAM_TAG" --no-tags
          # t1000e-base marks the upstream commit your custom patches sit on top of.
          # Rebase replays everything after t1000e-base onto the new release tag.
          git rebase --onto "$UPSTREAM_TAG" t1000e-base

      - name: Push release branch and tag
        run: |
          git push origin HEAD:refs/heads/t1000e-${UPSTREAM_VERSION}
          git tag t1000e-${UPSTREAM_VERSION}
          git push origin t1000e-${UPSTREAM_VERSION}
          git push origin refs/tags/${UPSTREAM_TAG}:refs/tags/${UPSTREAM_TAG}

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build T1000e Firmwares
        env:
          FIRMWARE_VERSION: ${{ env.UPSTREAM_VERSION }}-beala
        run: /usr/bin/env bash build.sh build-matching-firmwares t1000e_companion

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: t1000e-firmwares-${{ env.UPSTREAM_VERSION }}
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: t1000e-${{ env.UPSTREAM_VERSION }}
          name: T1000e ${{ env.UPSTREAM_VERSION }}
          body: |
            This is firmware for the SenseCAP T1000-E based on the MeshCore upstream release [${{ env.UPSTREAM_TAG }}](https://github.com/meshcore-dev/MeshCore/releases/tag/${{ env.UPSTREAM_TAG }}).

            This includes the following custom changes: https://github.com/${{ github.repository }}/compare/${{ env.UPSTREAM_TAG }}...t1000e-${{ env.UPSTREAM_VERSION }}
          files: out/*

  build-rak3401:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      UPSTREAM_VERSION: ${{ needs.check.outputs.upstream_version }}
      UPSTREAM_TAG: repeater-${{ needs.check.outputs.upstream_version }}
    steps:

      - name: Clone Repo
        uses: actions/checkout@v4
        with:
          ref: beala/rak3401
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase onto upstream release
        run: |
          git remote add upstream https://github.com/meshcore-dev/MeshCore.git
          git fetch upstream tag "$UPSTREAM_TAG" --no-tags
          # rak3401-base marks the upstream commit your custom patches sit on top of.
          # Rebase replays everything after rak3401-base onto the new release tag.
          git rebase --onto "$UPSTREAM_TAG" rak3401-base

      - name: Push release branch and tag
        run: |
          git push origin HEAD:refs/heads/rak3401-${UPSTREAM_VERSION}
          git tag rak3401-${UPSTREAM_VERSION}
          git push origin rak3401-${UPSTREAM_VERSION}
          git push origin refs/tags/${UPSTREAM_TAG}:refs/tags/${UPSTREAM_TAG}

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build RAK 3401 Repeater Firmware
        env:
          FIRMWARE_VERSION: ${{ env.UPSTREAM_VERSION }}-rak3401-rptr-obs
          PLATFORMIO_BUILD_FLAGS: -DMESH_PACKET_LOGGING=1
        run: /usr/bin/env bash build.sh build-firmware RAK_3401_repeater

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rak3401-firmwares-${{ env.UPSTREAM_VERSION }}
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rak3401-${{ env.UPSTREAM_VERSION }}
          name: RAK 3401 Repeater ${{ env.UPSTREAM_VERSION }}
          body: |
            RAK 3401 repeater firmware with packet logging, based on MeshCore [${{ env.UPSTREAM_TAG }}](https://github.com/meshcore-dev/MeshCore/releases/tag/${{ env.UPSTREAM_TAG }}).

            This includes the following custom changes: https://github.com/${{ github.repository }}/compare/${{ env.UPSTREAM_TAG }}...rak3401-${{ env.UPSTREAM_VERSION }}
          files: out/*
